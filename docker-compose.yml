# Docker Compose for Chore-Ganizer
# Builds the backend + frontend stack from local Dockerfiles.
#
# Usage:
#   docker compose up --build -d
#
# Configuration is read from the .env file in the same directory.

services:
  # Frontend service (React + Vite + nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chore-ganizer-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3002}:80"
    environment:
      # Runtime configuration (injected at container start)
      - VITE_API_URL=${VITE_API_URL:-}
      - VITE_DEBUG=${VITE_DEBUG:-false}
      - VITE_APP_VERSION=${APP_VERSION}
      # Backend port for nginx API proxy (substituted at runtime via envsubst)
      - BACKEND_PORT=${BACKEND_PORT:-3010}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - chore-ganizer-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Backend service (Express + Prisma + SQLite)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chore-ganizer-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3010}:3010"
    environment:
      # Core configuration
      - NODE_ENV=${NODE_ENV:-production}
      # Rate-limit ceilings — raised for a full Playwright UAT run (the
      # default 300/15min is exceeded by ~500 requests across the suite).
      # See backend/src/middleware/rateLimiter.ts.
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-300}
      - AUTH_RATE_LIMIT_MAX=${AUTH_RATE_LIMIT_MAX:-10}
      - PORT=3010
      - APP_VERSION=${APP_VERSION}
      # Data directory (host path mounted into container)
      - DATA_DIR=${DATA_DIR:-/opt/app-data/chore-ganizer}
      - DATABASE_URL=${DATABASE_URL:-file:${DATA_DIR:-/opt/app-data/chore-ganizer}/chore-ganizer.db}
      # User/group IDs for bind mount ownership (match host user)
      - PUID=${PUID:-1001}
      - PGID=${PGID:-1001}
      # IMPORTANT: SESSION_SECRET must be set in .env file - no default for security!
      - SESSION_SECRET=${SESSION_SECRET}
      # First-parent bootstrap (only used when database is empty)
      - BOOTSTRAP_PARENT_NAME=${BOOTSTRAP_PARENT_NAME:-}
      - BOOTSTRAP_PARENT_EMAIL=${BOOTSTRAP_PARENT_EMAIL:-}
      - BOOTSTRAP_PARENT_PASSWORD=${BOOTSTRAP_PARENT_PASSWORD:-}
      - BOOTSTRAP_PARENT_COLOR=${BOOTSTRAP_PARENT_COLOR:-#4F46E5}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3002}
      - SECURE_COOKIES=${SECURE_COOKIES:-false}
      - SESSION_MAX_AGE=${SESSION_MAX_AGE:-604800000}
      - NTFY_BASE_URL=${NTFY_BASE_URL:-}
    volumes:
      - ${DATA_DIR:-/opt/app-data/chore-ganizer}:${DATA_DIR:-/opt/app-data/chore-ganizer}
    networks:
      - chore-ganizer-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3010/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# Network configuration
networks:
  chore-ganizer-network:
    driver: bridge
    name: chore-ganizer-network
