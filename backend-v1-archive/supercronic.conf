# Chore-Ganizer Supercronic Configuration
# ============================================
# Cron jobs for automated backup tasks
# This file is used by supercronic to run scheduled jobs
#
# Schedule:
# - Backup runs daily at 2 AM
# - Restore test runs daily at 3 AM (separate job for better visibility)
# Note: Runs as appuser (non-root), so paths are adjusted accordingly
# Logs are redirected to stdout/stderr for Docker's log management
# Exit codes propagate to supercronic for proper error tracking
0 2 * * * /app/backup-scripts/backup.sh >> /proc/1/fd/1 2>&1
0 3 * * * /app/backup-scripts/restore-test.sh >> /proc/1/fd/1 2>&1
