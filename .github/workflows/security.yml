# Security Scanning Workflow for Chore-Ganizer
# Comprehensive security checks including SAST, dependency scanning, and container scanning

name: Security Scan

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  schedule:
    # Run security scans weekly on Monday at 2:00 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ==================== CODE SCANNING ====================
  
  # CodeQL - Static Analysis for JavaScript/TypeScript
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          upload: true

  # ==================== DEPENDENCY SCANNING ====================
  
  # npm audit for backend dependencies
  backend-deps:
    name: Backend Dependency Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      
      - name: Run npm audit
        working-directory: backend
        run: npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: Run npm audit (production only)
        working-directory: backend
        run: npm audit --audit-level=high --production
        continue-on-error: true

  # npm audit for frontend dependencies
  frontend-deps:
    name: Frontend Dependency Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=moderate
        continue-on-error: true
      
      - name: Run npm audit (production only)
        working-directory: frontend
        run: npm audit --audit-level=high --production
        continue-on-error: true

  # ==================== SECRET SCANNING ====================
  
  # TruffleHog - Secret scanning
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
        
      - name: Run Gitleaks
        uses: zricethezav/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          extra_args: --only-verified

  # ==================== SAST SCANNING ====================
  
  # Semgrep - Lightweight SAST
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Run Semgrep CI
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
            p/typescript
            p/javascript
        continue-on-error: true

      - name: Check if Semgrep SARIF file exists
        run: |
          if [ -f "semgrep.sarif" ]; then
            echo "SARIF_FILE_EXISTS=true" >> $GITHUB_ENV
          fi

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: env.SARIF_FILE_EXISTS == 'true'
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ==================== CONTAINER SCANNING ====================
  
  # Trivy - Container vulnerability scanning
  container-scan:
    name: Container Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [backend-deps, frontend-deps]
    if: github.event_name == 'push' || github.event_name == 'schedule'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Run Trivy vulnerability scanner (Backend)
        uses: aquasecurity/trivy-action@v0.35.0
        env:
          TRIVY_DB_REPOSITORY: 'ghcr.io/aquasecurity/trivy-db:2'
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
      
      - name: Check if Trivy backend SARIF exists
        run: |
          if [ -f "trivy-backend.sarif" ]; then
            echo "TRIVY_BACKEND_EXISTS=true" >> $GITHUB_ENV
          fi

      - name: Upload Trivy scan results (Backend)
        uses: github/codeql-action/upload-sarif@v4
        if: env.TRIVY_BACKEND_EXISTS == 'true'
        with:
          sarif_file: 'trivy-backend.sarif'
          category: 'trivy-backend'
      
      - name: Run Trivy vulnerability scanner (Frontend)
        uses: aquasecurity/trivy-action@v0.35.0
        env:
          TRIVY_DB_REPOSITORY: 'ghcr.io/aquasecurity/trivy-db:2'
        with:
          scan-type: 'fs'
          scan-ref: './frontend'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
      
      - name: Check if Trivy frontend SARIF exists
        run: |
          if [ -f "trivy-frontend.sarif" ]; then
            echo "TRIVY_FRONTEND_EXISTS=true" >> $GITHUB_ENV
          fi

      - name: Upload Trivy scan results (Frontend)
        uses: github/codeql-action/upload-sarif@v4
        if: env.TRIVY_FRONTEND_EXISTS == 'true'
        with:
          sarif_file: 'trivy-frontend.sarif'
          category: 'trivy-frontend'

